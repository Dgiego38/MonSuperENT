<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Cahier de Texte — ENT+</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Style pour la fenêtre de détails (Modale) */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0; top: 0;
            width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.5);
            backdrop-filter: blur(5px);
        }
        .modal-content {
            background-color: white;
            margin: 10% auto;
            padding: 25px;
            border-radius: 20px;
            width: 80%;
            max-width: 600px;
            max-height: 70vh;
            overflow-y: auto;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        .close-btn {
            float: right;
            font-size: 24px;
            cursor: pointer;
            color: var(--apple-gray);
        }
        .hw-card { cursor: pointer; transition: transform 0.2s; }
        .hw-card:hover { transform: scale(1.02); }
        .detail-html { line-height: 1.6; color: #333; margin-top: 20px; }
        .detail-html img { max-width: 100%; height: auto; border-radius: 8px; }
    </style>
</head>
<body>

    <nav class="sidebar">
        <div class="logo-container">ENT+</div>
        <ul class="nav-links">
            <li><a href="accueil.html">🏠 Tableau de Bord</a></li>
            <li><a href="messagerie.html">✉️ Messagerie</a></li>
            <li class="active"><a href="cahier-de-texte.html">📒 Cahier de Texte</a></li>
            <li><a href="fiche-eleve.html">👥 Fiches Élèves</a></li>
            <li><a href="absences.html">🚫 Absences</a></li>
            <li><a href="evaluations.html">📊 Évaluations</a></li>
            <li><a href="moodle.html">🎓 Moodle</a></li>
        </ul>
    </nav>

    <main class="main-content">
        <header class="header-top">
            <div class="user-info"><span id="userName">Chargement...</span></div>
        </header>

        <h1 class="section-title">Vos Devoirs</h1>
        <div class="hw-grid" id="fullHwList"></div>
    </main>

    <div id="hwModal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal()">&times;</span>
            <div id="modalBody"></div>
        </div>
    </div>

    <script>
        let allHomeworks = [];

        // Vérification de connexion
        if (localStorage.getItem('ent_plus_logged') !== 'true') {
            window.location.replace("login.html");
        }

        async function init() {
            try {
                // 1. On récupère l'utilisateur depuis le localStorage (plus de fetch /get-profile)
                const userRaw = localStorage.getItem('ent_user');
                if (userRaw) {
                    const user = JSON.parse(userRaw);
                    document.getElementById('userName').innerText = user.firstName + " " + user.lastName;
                }

                // 2. On récupère la session pour l'API
                const sessionRaw = localStorage.getItem('scolengo_session');
                if (!sessionRaw) return window.location.replace("login.html");
                const session = JSON.parse(sessionRaw);

                // 3. Appel à l'API Vercel
                const hRes = await fetch('/api/index?action=devoirs', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ session: session })
                });

                const data = await hRes.json();
                
                // Adaptation pour scolengo-api v3 (tableau direct ou .items)
                allHomeworks = Array.isArray(data) ? data : (data.items || []);

                const list = document.getElementById('fullHwList');
                list.innerHTML = "";

                if (allHomeworks.length > 0) {
                    allHomeworks.forEach((d, index) => {
                        const rawDate = d.dueDateTime || d.dueDate;
                        let dateDisplay = "À venir";

                        if (rawDate) {
                            const dateObj = new Date(rawDate);
                            if (!isNaN(dateObj.getTime())) {
                                dateDisplay = dateObj.toLocaleDateString('fr-FR', {day: 'numeric', month: 'short'});
                            }
                        }

                        const subjectName = (d.subject && typeof d.subject === 'object') 
                            ? (d.subject.label || "MATIÈRE") 
                            : (d.subject || "MATIÈRE");

                        list.innerHTML += `
                            <div class="hw-card" onclick="showDetail(${index})">
                                <div class="subject-tag">${subjectName.toUpperCase()}</div>
                                <div style="font-weight: 700; font-size: 17px; margin-bottom: 5px;">
                                    ${d.title || "Exercices"}
                                </div>
                                <div style="color: var(--apple-gray); font-size: 13px;">
                                    Pour le ${dateDisplay}
                                </div>
                            </div>
                        `;
                    });
                } else {
                    list.innerHTML = "<p style='padding:20px; color:gray;'>Aucun devoir trouvé.</p>";
                }
            } catch (e) { 
                console.error(e);
                document.getElementById('fullHwList').innerHTML = "<p style='color:red; padding:20px;'>Erreur lors du chargement des devoirs.</p>";
            }
        }

        function showDetail(index) {
            const hw = allHomeworks[index];
            const modal = document.getElementById('hwModal');
            const body = document.getElementById('modalBody');

            const subjectName = (hw.subject && typeof hw.subject === 'object') ? hw.subject.label : hw.subject;

            body.innerHTML = `
                <div class="subject-tag">${subjectName.toUpperCase()}</div>
                <h2 style="margin: 10px 0;">${hw.title || "Exercices"}</h2>
                <p style="color: var(--apple-gray);">Date limite : ${new Date(hw.dueDateTime || hw.dueDate).toLocaleDateString('fr-FR', {weekday: 'long', day: 'numeric', month: 'long'})}</p>
                <hr style="border: 0; border-top: 1px solid #eee; margin: 20px 0;">
                <div class="detail-html">
                    ${hw.html || hw.content || "<i>Pas de description détaillée.</i>"}
                </div>
            `;
            
            modal.style.display = "block";
        }

        function closeModal() {
            document.getElementById('hwModal').style.display = "none";
        }

        window.onclick = function(event) {
            const modal = document.getElementById('hwModal');
            if (event.target == modal) closeModal();
        }

        init();
    </script>
</body>
</html>
