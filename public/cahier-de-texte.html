<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cahier de texte — ENT+</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<script src="app.js"></script>
<script src="sidebar.js"></script>

<main class="main">
    <div class="page-header">
        <div>
            <div class="page-title">📒 Cahier de texte</div>
            <div class="page-subtitle">Travail à faire et consignes de vos professeurs</div>
        </div>
        <div style="display:flex; gap:10px; align-items:center">
            <select id="filterSubject" class="search-field" style="width:auto; padding:10px 16px;">
                <option value="">Toutes les matières</option>
            </select>
        </div>
    </div>

    <div id="hwContainer">
        <div class="loading-dots" style="justify-content:flex-start; padding:40px 0">
            <span></span><span></span><span></span>
        </div>
    </div>
</main>

<!-- Modal -->
<div class="modal-overlay" id="modal">
    <div class="modal-box">
        <button class="modal-close" onclick="closeModal()">✕</button>
        <div id="modalContent"></div>
    </div>
</div>

<script>
    initPage('cahier-de-texte');
    let allHw = [];

    async function load() {
        try {
            const cached = localStorage.getItem('cache_hw');
            if (cached) { allHw = JSON.parse(cached); render(); }

            const data = await API.post('devoirs');
            allHw = data.items || [];
            localStorage.setItem('cache_hw', JSON.stringify(allHw));
            render();
            fillSubjectFilter();
        } catch(e) {
            if (allHw.length === 0) {
                document.getElementById('hwContainer').innerHTML = `
                    <div class="empty-state">
                        <span class="empty-icon">⚠️</span>
                        <div class="empty-title">Erreur de connexion</div>
                        <p style="color:var(--text-3)">${e.message}</p>
                        <button class="btn btn-primary" style="margin-top:16px" onclick="load()">Réessayer</button>
                    </div>`;
            }
        }
    }

    function fillSubjectFilter() {
        const subjects = [...new Set(allHw.map(d => {
            return typeof d.subject === 'object'
                ? (d.subject?.label || '') : (d.subject || '');
        }).filter(Boolean))].sort();

        const sel = document.getElementById('filterSubject');
        subjects.forEach(s => {
            const opt = document.createElement('option');
            opt.value = s; opt.textContent = s;
            sel.appendChild(opt);
        });
    }

    document.getElementById('filterSubject').addEventListener('change', render);

    function render() {
        const filter = document.getElementById('filterSubject').value;
        const filtered = filter
            ? allHw.filter(d => {
                const s = typeof d.subject === 'object' ? (d.subject?.label||'') : (d.subject||'');
                return s === filter;
              })
            : allHw;

        if (filtered.length === 0) {
            document.getElementById('hwContainer').innerHTML = `
                <div class="empty-state">
                    <span class="empty-icon">🎉</span>
                    <div class="empty-title">Aucun devoir !</div>
                    <p style="color:var(--text-3)">Profitez-en !</p>
                </div>`;
            return;
        }

        // Grouper par date
        const sorted = [...filtered].sort((a,b) =>
            new Date(a.dueDateTime||a.dueDate) - new Date(b.dueDateTime||b.dueDate)
        );

        const groups = {};
        sorted.forEach((d, i) => {
            const rawDate = d.dueDateTime || d.dueDate;
            const key = rawDate ? new Date(rawDate).toLocaleDateString('fr-FR', {
                weekday: 'long', day: 'numeric', month: 'long'
            }) : 'Date inconnue';
            if (!groups[key]) groups[key] = [];
            groups[key].push({ ...d, _idx: i });
        });

        let html = '';
        for (const [dateKey, items] of Object.entries(groups)) {
            const isToday = dateKey === new Date().toLocaleDateString('fr-FR', {
                weekday: 'long', day: 'numeric', month: 'long'
            });
            html += `
                <div style="margin-bottom:32px">
                    <div style="display:flex; align-items:center; gap:12px; margin-bottom:16px">
                        <div style="height:1px; background:var(--border); flex:1"></div>
                        <span class="tag ${isToday ? 'tag-blue' : 'tag-gray'}" style="font-size:12px">
                            📅 ${dateKey}
                        </span>
                        <div style="height:1px; background:var(--border); flex:1"></div>
                    </div>
                    <div class="hw-grid">
                        ${items.map(d => hwCard(d)).join('')}
                    </div>
                </div>
            `;
        }

        document.getElementById('hwContainer').innerHTML = html;
    }

    function hwCard(d) {
        const subName = typeof d.subject === 'object'
            ? (d.subject?.label || 'Matière') : (d.subject || 'Matière');
        const c = subjectColor(subName);
        const urgent  = DateUtils.isUrgent(d.dueDateTime||d.dueDate);
        const overdue = DateUtils.isOverdue(d.dueDateTime||d.dueDate);
        const hasContent = !!(d.description || d.content || d.html);

        return `
            <div class="hw-card" style="border-left-color:${c}" onclick='showDetail(${JSON.stringify(d).replace(/'/g,"&#39;")})'>
                <div style="display:flex; align-items:flex-start; justify-content:space-between; gap:8px; margin-bottom:8px">
                    <div class="hw-subject" style="color:${c}">${subName.toUpperCase()}</div>
                    ${d.done ? '<span class="tag tag-green" style="font-size:10px">✓ Fait</span>' : ''}
                </div>
                <div class="hw-title">${d.title || 'Travail à faire'}</div>
                ${d.teacher ? `<div style="font-size:12px; color:var(--text-3); margin-bottom:6px">👨‍🏫 ${typeof d.teacher === 'object' ? d.teacher.label : d.teacher}</div>` : ''}
                <div class="hw-date ${urgent ? 'urgent' : overdue ? 'overdue' : ''}">
                    ${overdue ? '⏰ Dépassé' : urgent ? '⚡ Urgent' : '📅'} ${DateUtils.weekday(d.dueDateTime||d.dueDate)}
                    ${hasContent ? '<span style="margin-left:auto; font-size:10px; color:var(--text-3)">Consigne →</span>' : ''}
                </div>
            </div>
        `;
    }

    function showDetail(d) {
        const subName = typeof d.subject === 'object'
            ? (d.subject?.label || 'Matière') : (d.subject || 'Matière');
        const c = subjectColor(subName);
        const content = d.description || d.content || d.html
            || '<em style="color:var(--text-3)">Aucune consigne écrite par le professeur.</em>';

        openModal(`
            <span class="tag" style="background:${c}22; color:${c}; border:1px solid ${c}44; display:inline-block; margin-bottom:12px">
                ${subName.toUpperCase()}
            </span>
            <h2 style="font-size:22px; font-weight:700; margin-bottom:6px">${d.title || 'Travail à faire'}</h2>
            ${d.teacher ? `<p style="color:var(--text-2);font-size:13px;margin-bottom:4px">👨‍🏫 ${typeof d.teacher === 'object' ? d.teacher.label : d.teacher}</p>` : ''}
            <p style="color:var(--blue); font-size:14px; font-weight:600; margin-bottom:20px">
                📅 Pour le ${DateUtils.long(d.dueDateTime || d.dueDate)}
            </p>
            <div class="divider"></div>
            <div class="rich-content" style="margin-top:20px">${content}</div>
        `);
    }

    load();
</script>
</body>
</html>
