<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion — ENT+</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="login-bg"></div>

<div class="login-wrapper">
    <div class="login-card">

        <!-- Step 1 : Recherche école -->
        <div id="step1">
            <div class="login-logo">
                <div class="login-logo-icon">🏫</div>
                <div class="login-title">ENT+</div>
                <div class="login-subtitle">Connectez-vous à votre établissement Skolengo</div>
            </div>

            <div class="search-input-wrap" style="position:relative">
                <span class="search-icon">🔍</span>
                <input
                    type="text"
                    id="schoolInput"
                    class="search-field"
                    placeholder="Nom, ville ou code postal..."
                    autocomplete="off"
                    autofocus
                >
                <div id="searchResults" class="search-results"></div>
            </div>

            <p style="color:var(--text-3); font-size:12px; text-align:center; margin-top:20px;">
                Connexion sécurisée via EduConnect / Skolengo
            </p>
        </div>

        <!-- Step 2 : Chargement -->
        <div id="step2" style="display:none">
            <div class="login-status">
                <div class="spinner"></div>
                <div class="login-status-title" id="statusTitle">Connexion en cours...</div>
                <div class="login-status-sub" id="statusSub">Liaison avec votre ENT</div>
            </div>
        </div>

        <!-- Step 3 : Erreur -->
        <div id="step3" style="display:none">
            <div class="login-status">
                <span style="font-size:48px">⚠️</span>
                <div class="login-status-title">Échec de connexion</div>
                <div class="login-status-sub" id="errorMsg">Une erreur est survenue.</div>
                <button class="btn btn-primary" style="margin-top:24px" onclick="resetLogin()">Réessayer</button>
            </div>
        </div>
    </div>
</div>

<script>
    // Si déjà connecté → accueil
    if (localStorage.getItem('ent_logged') === 'true') {
        window.location.replace('accueil.html');
    }

    const schoolInput = document.getElementById('schoolInput');
    const resultsDiv  = document.getElementById('searchResults');
    let searchTimer;

    function showStep(n) {
        ['step1','step2','step3'].forEach((id, i) => {
            document.getElementById(id).style.display = (i === n-1) ? 'block' : 'none';
        });
    }

    function resetLogin() {
        showStep(1);
        schoolInput.value = '';
        schoolInput.focus();
    }

    // ── Recherche école ──────────────────────────────────────
    schoolInput.addEventListener('input', e => {
        clearTimeout(searchTimer);
        const val = e.target.value.trim();
        if (val.length < 2) { resultsDiv.style.display = 'none'; return; }

        searchTimer = setTimeout(async () => {
            try {
                const r = await fetch(`/api/index?action=search-school&q=${encodeURIComponent(val)}`);
                const schools = await r.json();

                resultsDiv.innerHTML = '';
                if (!schools || schools.length === 0) {
                    resultsDiv.style.display = 'none'; return;
                }

                resultsDiv.style.display = 'block';
                schools.slice(0, 12).forEach(school => {
                    const city = (school.location?.city || school.city || '').replace('CEDEX','').trim();
                    const zip  = school.location?.zipCode || '';
                    const div  = document.createElement('div');
                    div.className = 'result-item';
                    div.innerHTML = `
                        <div class="result-icon">🏫</div>
                        <div>
                            <div class="result-name">${school.name}</div>
                            <div class="result-detail">${city}${zip ? ' ('+zip+')' : ''}</div>
                        </div>
                        <span class="result-arrow">→</span>
                    `;
                    div.addEventListener('click', () => startAuth(school));
                    resultsDiv.appendChild(div);
                });
            } catch(err) {
                console.error('Search error:', err);
            }
        }, 300);
    });

    document.addEventListener('click', e => {
        if (!schoolInput.contains(e.target) && !resultsDiv.contains(e.target)) {
            resultsDiv.style.display = 'none';
        }
    });

    // ── Démarrage auth ───────────────────────────────────────
    async function startAuth(school) {
        resultsDiv.style.display = 'none';
        showStep(2);
        document.getElementById('statusTitle').textContent = `Liaison avec ${school.name}`;
        document.getElementById('statusSub').textContent = 'Initialisation du protocole OIDC...';

        // Extraction URL
        let baseUrl = school.url || school.baseUrl ||
                      school.location?.homepage ||
                      school.links?.[0]?.href || '';

        if (!baseUrl) {
            showStep(3);
            document.getElementById('errorMsg').textContent = "Adresse ENT introuvable pour cet établissement.";
            return;
        }

        baseUrl = baseUrl.trim().replace(/\/$/, '');
        localStorage.setItem('ent_school_url', baseUrl);

        try {
            const r = await fetch(`/api/index?action=get-auth-url&url=${encodeURIComponent(baseUrl)}`);
            const data = await r.json();

            if (!data.authURL) throw new Error(data.error || data.details || "URL d'auth non reçue");

            // Stocker le verifier PKCE pour le callback
            localStorage.setItem('ent_pkce_verifier', data.codeVerifier);

            document.getElementById('statusSub').textContent = 'Redirection vers EduConnect...';
            setTimeout(() => { window.location.href = data.authURL; }, 400);

        } catch(err) {
            showStep(3);
            document.getElementById('errorMsg').textContent = err.message;
        }
    }

    // ── Traitement du callback OAuth ─────────────────────────
    async function handleCallback() {
        const params    = new URLSearchParams(window.location.search);
        const code      = params.get('code');
        const schoolUrl = localStorage.getItem('ent_school_url');
        const verifier  = localStorage.getItem('ent_pkce_verifier');

        if (!code) return; // Pas de callback, afficher step1 normal

        showStep(2);
        document.getElementById('statusTitle').textContent = 'Finalisation...';
        document.getElementById('statusSub').textContent = 'Vérification de la session...';

        // Nettoyer l'URL
        window.history.replaceState({}, '', '/login.html');

        try {
            if (!schoolUrl || !verifier) throw new Error("Données de session manquantes. Recommencez.");

            const r = await fetch(
                `/api/index?action=callback&code=${encodeURIComponent(code)}&url=${encodeURIComponent(schoolUrl)}&verifier=${encodeURIComponent(verifier)}`
            );
            const data = await r.json();

            if (!data.success) throw new Error(data.error || "Erreur callback");

            // Sauvegarde session
            localStorage.setItem('ent_logged', 'true');
            localStorage.setItem('ent_session', JSON.stringify(data.session));
            localStorage.setItem('ent_user', JSON.stringify(data.user));
            localStorage.removeItem('ent_pkce_verifier');
            localStorage.removeItem('ent_school_url');

            document.getElementById('statusTitle').textContent = `Bienvenue, ${data.user?.firstName || ''} !`;
            document.getElementById('statusSub').textContent = 'Chargement de votre espace...';

            setTimeout(() => { window.location.replace('accueil.html'); }, 600);

        } catch(err) {
            showStep(3);
            document.getElementById('errorMsg').textContent = err.message;
        }
    }

    handleCallback();
</script>
</body>
</html>
