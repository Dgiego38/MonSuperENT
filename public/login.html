<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Connexion — ENT+</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .search-results {
            background: white;
            border-radius: 12px;
            margin-top: 10px;
            max-height: 300px;
            overflow-y: auto;
            box-shadow: 0 8px 24px rgba(0,0,0,0.12);
            display: none;
            position: absolute;
            width: 100%;
            left: 0;
            z-index: 100;
            border: 1px solid #eee;
        }
        .result-item {
            padding: 12px 16px;
            border-bottom: 1px solid #f5f5f7;
            cursor: pointer;
            text-align: left;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: background 0.2s;
        }
        .result-item:hover { background: #f9f9fb; }
        .school-info { flex-grow: 1; }
        .school-name { display: block; color: #1d1d1f; font-size: 14px; font-weight: 600; }
        .school-details { font-size: 12px; color: #86868b; }
        .school-ems { color: #0071e3; font-weight: 500; font-size: 11px; margin-right: 5px; }
        
        .btn-select-small {
            background: #f5f5f7;
            border: none;
            padding: 6px 12px;
            border-radius: 15px;
            font-size: 12px;
            font-weight: 500;
            color: #0071e3;
            cursor: pointer;
        }
        .result-item:hover .btn-select-small { background: #0071e3; color: white; }

        .step { display: none; }
        .step.active { display: block; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        .input-container { position: relative; width: 100%; }
    </style>
</head>
<body>

<div class="login-wrapper">
    <div class="login-card">
        <h1>🏫 ENT+</h1>
        
        <div id="step1" class="step active">
            <p style="margin-bottom: 20px; color: #86868b;">Trouvez votre établissement</p>
            <div class="input-container">
                <input type="text" id="schoolInput" class="btn-login" 
                       style="background:white; color:black; border:1px solid #ddd; text-align:left;" 
                       placeholder="Nom (ex: Pierre Polie), Ville...">
                <div id="results" class="search-results"></div>
            </div>
        </div>

        <div id="step2" class="step">
            <div class="loading-wave" style="margin: 30px 0;">
                <div class="dot"></div>
                <div class="dot"></div>
                <div class="dot"></div>
            </div>
            <p id="statusText" style="color: #1d1d1f; font-weight: 500;">Initialisation sécurisée...</p>
        </div>
    </div>
</div>

<script>
    const schoolInput = document.getElementById('schoolInput');
    const resultsDiv = document.getElementById('results');
    const statusText = document.getElementById('statusText');
    let searchTimeout;

    // 1. GESTION DU CALLBACK
    async function checkCallback() {
        const urlParams = new URLSearchParams(window.location.search);
        const code = urlParams.get('code');
        const savedUrl = localStorage.getItem('temp_school_url');

        if (code && savedUrl) {
            document.getElementById('step1').classList.remove('active');
            document.getElementById('step2').classList.add('active');
            statusText.innerText = "Finalisation de la connexion...";

            try {
                const res = await fetch(`/api/index?action=callback&code=${code}&url=${encodeURIComponent(savedUrl)}`);
                const data = await res.json();

                if (data.success) {
                    localStorage.setItem('scolengo_session', JSON.stringify(data.session));
                    localStorage.setItem('ent_user', JSON.stringify(data.user));
                    localStorage.removeItem('temp_school_url');
                    window.location.href = "accueil.html";
                } else {
                    throw new Error(data.error || "Erreur de session");
                }
            } catch (e) {
                alert("Erreur : " + e.message);
                window.location.href = "login.html";
            }
        }
    }

    // 2. MOTEUR DE RECHERCHE
    schoolInput.addEventListener('input', (e) => {
        clearTimeout(searchTimeout);
        const val = e.target.value;
        if (val.length < 3) { resultsDiv.style.display = 'none'; return; }

        searchTimeout = setTimeout(async () => {
            try {
                const res = await fetch(`/api/index?action=search-school&q=${encodeURIComponent(val)}`);
                const schools = await res.json();
                resultsDiv.innerHTML = "";
                if (schools && schools.length > 0) {
                    resultsDiv.style.display = 'block';
                    schools.forEach(school => {
                        const div = document.createElement('div');
                        div.className = 'result-item';
                        const city = (school.address?.city || school.city || "").replace('CEDEX', '').trim();
                        div.innerHTML = `
                            <div class="school-info">
                                <strong class="school-name">${school.name}</strong>
                                <span class="school-details">${city}</span>
                            </div>
                            <button class="btn-select-small">Choisir</button>
                        `;
                        div.onclick = () => startAuth(school);
                        resultsDiv.appendChild(div);
                    });
                }
            } catch (err) { console.error(err); }
        }, 350);
    });

    // 3. RÉSOLUTION DYNAMIQUE DE L'URL
    async function startAuth(school) {
        // A. On tente d'abord de récupérer l'URL fournie par Skolengo
        let baseUrl = school.baseUrl || school.url || (school.fallback ? school.fallback.url : "");

        // B. Si l'URL est vide ou incomplète (problème courant Grand-Est), on la reconstruit
        if (!baseUrl || baseUrl.includes("skolengo.com")) {
            console.log("Reconstruction dynamique pour :", school.name);
            
            // On nettoie le nom pour le format URL
            let slug = school.name.toLowerCase()
                .trim()
                .normalize("NFD").replace(/[\u0300-\u036f]/g, "") // Enlève accents
                .replace(/college/g, "clg")  // Format standard ENT
                .replace(/lycee/g, "lyc")    // Format standard ENT
                .replace(/[^a-z0-9]/g, "-")  // Remplace tout le reste par des tirets
                .replace(/-+/g, "-")         // Pas de doubles tirets
                .replace(/^-|-$/g, "");      // Pas de tiret au début ou à la fin

            // On ajoute le domaine MonBureauNumerique (majoritaire dans le Grand Est)
            baseUrl = `https://${slug}.monbureaunumerique.fr`;
        }

        // Nettoyage final (supprime le / à la fin)
        baseUrl = baseUrl.trim().replace(/\/$/, "");
        localStorage.setItem('temp_school_url', baseUrl);
        
        document.getElementById('step1').classList.remove('active');
        document.getElementById('step2').classList.add('active');
        statusText.innerText = "Liaison avec l'ENT...";

        try {
            const res = await fetch(`/api/index?action=get-auth-url&url=${encodeURIComponent(baseUrl)}`);
            const data = await res.json();
            
            if(data.authURL) {
                window.location.href = data.authURL;
            } else {
                throw new Error("L'adresse générée (" + baseUrl + ") ne répond pas.");
            }
        } catch (e) {
            alert("Erreur de liaison : " + e.message);
            location.reload();
        }
    }

    document.addEventListener('click', (e) => {
        if (!schoolInput.contains(e.target)) resultsDiv.style.display = 'none';
    });

    checkCallback();
</script>
</body>
</html>
