<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion — ENT+</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="login-bg"></div>

<div class="login-wrapper">
    <div class="login-card">

        <!-- STEP 1 -->
        <div id="step1">
            <div class="login-logo">
                <div class="login-logo-icon">🏫</div>
                <div class="login-title">ENT+</div>
                <div class="login-subtitle">Connexion à ton établissement</div>
            </div>

            <div class="search-input-wrap" style="position:relative">
                <input
                    type="text"
                    id="schoolInput"
                    class="search-field"
                    placeholder="Nom de ton collège ou ville..."
                    autocomplete="off"
                    autofocus
                >
                <div id="searchResults" class="search-results"></div>
            </div>
        </div>

        <!-- STEP 2 -->
        <div id="step2" style="display:none">
            <div class="login-status">
                <div class="spinner"></div>
                <div class="login-status-title" id="statusTitle">Connexion...</div>
                <div class="login-status-sub" id="statusSub">Préparation</div>
            </div>
        </div>

        <!-- STEP 3 -->
        <div id="step3" style="display:none">
            <div class="login-status">
                <span style="font-size:48px">❌</span>
                <div class="login-status-title">Erreur</div>
                <div class="login-status-sub" id="errorMsg"></div>
                <button onclick="resetLogin()">Réessayer</button>
            </div>
        </div>

    </div>
</div>

<script>
/* ─────────────────────────────
   AUTO LOGIN
───────────────────────────── */
if (localStorage.getItem('ent_logged') === 'true') {
    window.location.replace('accueil.html');
}

/* ─────────────────────────────
   VARIABLES
───────────────────────────── */
const schoolInput = document.getElementById('schoolInput');
const resultsDiv  = document.getElementById('searchResults');
let timer;

/* ─────────────────────────────
   UI
───────────────────────────── */
function showStep(n) {
    ['step1','step2','step3'].forEach((id, i) => {
        document.getElementById(id).style.display = (i === n-1) ? 'block' : 'none';
    });
}

function resetLogin() {
    localStorage.clear();
    showStep(1);
    schoolInput.value = '';
}

/* ─────────────────────────────
   SEARCH
───────────────────────────── */
schoolInput.addEventListener('input', e => {
    clearTimeout(timer);
    const val = e.target.value.trim();

    if (val.length < 3) {
        resultsDiv.style.display = 'none';
        return;
    }

    timer = setTimeout(async () => {
        try {
            const res = await fetch(`/api/index?action=search-school&q=${encodeURIComponent(val)}`);
            const schools = await res.json();

            console.log("SCHOOLS:", schools);

            resultsDiv.innerHTML = '';

            if (!schools.length) return;

            resultsDiv.style.display = 'block';

            schools.forEach(school => {
                const div = document.createElement('div');
                div.className = 'result-item';

                div.textContent = school.name;

                div.onclick = () => startAuth(school);

                resultsDiv.appendChild(div);
            });

        } catch (e) {
            console.error(e);
        }
    }, 300);
});

/* ─────────────────────────────
   AUTH
───────────────────────────── */
async function startAuth(school) {
    showStep(2);

    document.getElementById('statusTitle').textContent =
        "Connexion à " + school.name;

    // 🔥 IMPORTANT : URL toujours définie
    let baseUrl = school.baseUrl || "https://www.monbureaunumerique.fr";

    console.log("BASE URL:", baseUrl);

    localStorage.setItem('ent_school_url', baseUrl);

    try {
        const res = await fetch(`/api/index?action=get-auth-url&url=${encodeURIComponent(baseUrl)}`);
        const data = await res.json();

        console.log("AUTH:", data);

        if (!data.authURL) throw new Error("Erreur connexion ENT");

        localStorage.setItem('ent_pkce_verifier', data.codeVerifier);

        document.getElementById('statusSub').textContent =
            "Redirection...";

        setTimeout(() => {
            window.location.href = data.authURL;
        }, 500);

    } catch (err) {
        showStep(3);
        document.getElementById('errorMsg').textContent = err.message;
    }
}

/* ─────────────────────────────
   CALLBACK
───────────────────────────── */
async function handleCallback() {
    const params = new URLSearchParams(window.location.search);
    const code = params.get('code');

    if (!code) return;

    showStep(2);

    const schoolUrl = localStorage.getItem('ent_school_url');
    const verifier  = localStorage.getItem('ent_pkce_verifier');

    try {
        const res = await fetch(
            `/api/index?action=callback&code=${code}&url=${encodeURIComponent(schoolUrl)}&verifier=${verifier}`
        );

        const data = await res.json();

        console.log("CALLBACK:", data);

        if (!data.success) throw new Error(data.error);

        localStorage.setItem('ent_logged', 'true');
        localStorage.setItem('ent_session', JSON.stringify(data.session));
        localStorage.setItem('ent_user', JSON.stringify(data.user));

        window.location.replace('accueil.html');

    } catch (err) {
        showStep(3);
        document.getElementById('errorMsg').textContent = err.message;
    }
}

handleCallback();
</script>

</body>
</html>
