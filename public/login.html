<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion — ENT+</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="login-bg"></div>

<div class="login-wrapper">
    <div class="login-card">

        <div id="step1">
            <div class="login-logo">
                <div class="login-logo-icon">🏫</div>
                <div class="login-title">ENT+</div>
                <div class="login-subtitle">Connectez-vous à votre établissement Skolengo</div>
            </div>

            <div class="search-input-wrap" style="position:relative">
                <span class="search-icon">🔍</span>
                <input
                    type="text"
                    id="schoolInput"
                    class="search-field"
                    placeholder="Nom, ville ou code postal..."
                    autocomplete="off"
                    autofocus
                >
                <div id="searchResults" class="search-results"></div>
            </div>

            <p style="color:var(--text-3); font-size:12px; text-align:center; margin-top:20px;">
                Connexion sécurisée via EduConnect / Skolengo
            </p>
        </div>

        <div id="step2" style="display:none">
            <div class="login-status">
                <div class="spinner"></div>
                <div class="login-status-title" id="statusTitle">Connexion en cours...</div>
                <div class="login-status-sub" id="statusSub">Liaison avec votre ENT</div>
            </div>
        </div>

        <div id="step3" style="display:none">
            <div class="login-status">
                <span style="font-size:48px">⚠️</span>
                <div class="login-status-title">Échec de connexion</div>
                <div class="login-status-sub" id="errorMsg">Une erreur est survenue.</div>
                <button class="btn btn-primary" style="margin-top:24px" onclick="resetLogin()">Réessayer</button>
            </div>
        </div>
    </div>
</div>

<script>
    // Sécurité : redirection si déjà loggé
    if (localStorage.getItem('ent_logged') === 'true') {
        window.location.replace('accueil.html');
    }

    const schoolInput = document.getElementById('schoolInput');
    const resultsDiv  = document.getElementById('searchResults');
    let searchTimer;

    function showStep(n) {
        ['step1','step2','step3'].forEach((id, i) => {
            document.getElementById(id).style.display = (i === n-1) ? 'block' : 'none';
        });
    }

    function resetLogin() {
        showStep(1);
        schoolInput.value = '';
        schoolInput.focus();
    }

    // ── Recherche d'école ─────────────────────────────────────
    schoolInput.addEventListener('input', e => {
        clearTimeout(searchTimer);
        const val = e.target.value.trim();
        if (val.length < 3) { resultsDiv.style.display = 'none'; return; }

        searchTimer = setTimeout(async () => {
            try {
                const r = await fetch(`/api/index?action=search-school&q=${encodeURIComponent(val)}`);
                const schools = await r.json();

                resultsDiv.innerHTML = '';
                // Vérification robuste du format de réponse
                if (!Array.isArray(schools) || schools.length === 0) {
                    resultsDiv.style.display = 'none'; return;
                }

                resultsDiv.style.display = 'block';
                schools.slice(0, 10).forEach(school => {
                    const city = (school.location?.city || school.city || '').replace('CEDEX','').trim();
                    const zip  = school.location?.zipCode || '';
                    const div  = document.createElement('div');
                    div.className = 'result-item';
                    div.innerHTML = `
                        <div class="result-icon">🏫</div>
                        <div style="flex:1">
                            <div class="result-name">${school.name}</div>
                            <div class="result-detail">${city}${zip ? ' ('+zip+')' : ''}</div>
                        </div>
                        <span class="result-arrow">→</span>
                    `;
                    div.addEventListener('click', () => startAuth(school));
                    resultsDiv.appendChild(div);
                });
            } catch(err) {
                console.error('Search error:', err);
            }
        }, 350);
    });

    // Fermer les résultats au clic extérieur
    document.addEventListener('click', e => {
        if (!schoolInput.contains(e.target) && !resultsDiv.contains(e.target)) {
            resultsDiv.style.display = 'none';
        }
    });

    // ── Démarrage de l'authentification ───────────────────────
    async function startAuth(school) {
        resultsDiv.style.display = 'none';
        showStep(2);
        document.getElementById('statusTitle').textContent = `Liaison avec ${school.name}`;
        
        // 1. Recherche récursive de l'URL dans l'objet school
        function findUrl(obj) {
            if (!obj || typeof obj !== 'object') return null;
            if (typeof obj.url === 'string' && obj.url.startsWith('http')) return obj.url;
            if (typeof obj.baseUrl === 'string' && obj.baseUrl.startsWith('http')) return obj.baseUrl;
            if (obj.location?.homepage) return obj.location.homepage;
            for (let k in obj) { let r = findUrl(obj[k]); if (r) return r; }
            return null;
        }

        let baseUrl = findUrl(school);

        // 2. Correction manuelle pour les ENT régionaux (ex: Mende / Occitanie)
        if (!baseUrl && school.name?.toLowerCase().includes('mende')) {
            baseUrl = "https://www.ent-occitanie.fr";
        }

        if (!baseUrl) {
            showStep(3);
            document.getElementById('errorMsg').textContent = "L'adresse technique de cet établissement n'est pas fournie. Essayez le nom de votre ville.";
            return;
        }

        // Nettoyage de l'URL
        baseUrl = baseUrl.trim().replace(/\/$/, '');
        localStorage.setItem('ent_school_url', baseUrl);

        try {
            // Appel au backend pour générer l'URL et le PKCE Verifier
            const r = await fetch(`/api/index?action=get-auth-url&url=${encodeURIComponent(baseUrl)}`);
            const data = await r.json();

            if (!data.authURL || !data.codeVerifier) {
                throw new Error(data.error || "Impossible de préparer la connexion sécurisée.");
            }

            // Sauvegarde du verifier pour le callback (étape finale)
            localStorage.setItem('ent_pkce_verifier', data.codeVerifier);

            document.getElementById('statusSub').textContent = 'Redirection vers le portail de connexion...';
            
            // Petit délai pour laisser le temps au localStorage
            setTimeout(() => { window.location.href = data.authURL; }, 300);

        } catch(err) {
            showStep(3);
            document.getElementById('errorMsg').textContent = err.message;
        }
    }

    // ── Traitement du retour (Callback) ───────────────────────
    async function handleCallback() {
        const params = new URLSearchParams(window.location.search);
        const code = params.get('code');
        const schoolUrl = localStorage.getItem('ent_school_url');
        const verifier = localStorage.getItem('ent_pkce_verifier');

        // Si on n'a pas de code dans l'URL, on est juste sur la page de login normale
        if (!code) return; 

        showStep(2);
        document.getElementById('statusTitle').textContent = 'Vérification...';
        document.getElementById('statusSub').textContent = 'Finalisation de la session Skolengo';

        // Nettoyer l'URL proprement
        window.history.replaceState({}, '', '/login.html');

        try {
            if (!schoolUrl || !verifier) {
                throw new Error("Session expirée ou invalide. Veuillez réessayer la recherche.");
            }

            const r = await fetch(
                `/api/index?action=callback&code=${encodeURIComponent(code)}&url=${encodeURIComponent(schoolUrl)}&verifier=${encodeURIComponent(verifier)}`
            );
            const data = await r.json();

            if (!data.success) throw new Error(data.error || "Échec de l'authentification.");

            // Sauvegarde définitive des données
            localStorage.setItem('ent_logged', 'true');
            localStorage.setItem('ent_session', JSON.stringify(data.session));
            localStorage.setItem('ent_user', JSON.stringify(data.user));
            
            // Nettoyage temporaire
            localStorage.removeItem('ent_pkce_verifier');
            localStorage.removeItem('ent_school_url');

            document.getElementById('statusTitle').textContent = `Bonjour ${data.user?.firstName || ''} !`;
            document.getElementById('statusSub').textContent = 'Ouverture de votre tableau de bord...';

            setTimeout(() => { window.location.replace('accueil.html'); }, 800);

        } catch(err) {
            showStep(3);
            document.getElementById('errorMsg').textContent = err.message;
        }
    }

    // Lancer la détection du callback au chargement
    handleCallback();
</script>
</body>
</html>
