<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Connexion — ENT+</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="login-wrapper">

    <div class="login-card">
        <h1>ENT+</h1>
        <p>Collez votre jeton Scolengo pour commencer</p>

        <textarea id="tokenInput" class="input-area" placeholder='{"tokenSet": ...}'></textarea>
        
        <button id="connectBtn" class="btn-login">Se connecter</button>
        
        <div id="loginMsg"></div>
    </div>

    <script>
        // Si déjà connecté, on redirige vers l'accueil directement
        if (localStorage.getItem('ent_plus_logged') === 'true') {
            window.location.replace("accueil.html");
        }

        const btn = document.getElementById('connectBtn');
        const msg = document.getElementById('loginMsg');

        btn.onclick = async () => {
            const tokenValue = document.getElementById('tokenInput').value.trim();
            
            if(!tokenValue) return;

            btn.disabled = true;
            btn.innerText = "Connexion...";

            try {
                // ANALYSE DU JETON
                // On vérifie que c'est bien du JSON valide avant de sauvegarder
                const parsedToken = JSON.parse(tokenValue);

                // SAUVEGARDE LOCALE (Adieu le serveur pour cette étape !)
                localStorage.setItem('scolengo_session', JSON.stringify(parsedToken));
                localStorage.setItem('ent_plus_logged', 'true');

                // Succès visuel
                msg.style.color = "#10b981";
                msg.innerText = "Synchronisation réussie !";
                
                setTimeout(() => {
                    window.location.replace("accueil.html");
                }, 800);

            } catch(e) {
                // Si le JSON est mal collé ou invalide
                msg.style.color = "#ff4b4b"; 
                msg.innerText = "Erreur : Format du jeton invalide";
                btn.disabled = false;
                btn.innerText = "Se connecter";
                console.error("Erreur de parsing JSON:", e);
            }
        };
    </script>
</body>
</html>
