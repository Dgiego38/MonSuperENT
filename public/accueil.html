<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Tableau de Bord — ENT+</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav class="sidebar">
        <div class="logo-container">ENT+</div>
        
        <ul class="nav-links">
            <li class="active"><a href="accueil.html">🏠 Tableau de Bord</a></li>
            <li><a href="messagerie.html">✉️ Messagerie</a></li>
            <li><a href="cahier-de-texte.html">📒 Cahier de Texte</a></li>
            <li><a href="fiche-eleve.html">👥 Fiches Élèves</a></li>
            <li><a href="absences.html">🚫 Absences</a></li>
            <li><a href="evaluations.html">📊 Évaluations</a></li>
            <li><a href="moodle.html">🎓 Moodle</a></li>
        </ul>

        <div class="sidebar-footer">
            <div style="font-size: 12px; color: var(--apple-gray);">Établissement +</div>
            <button class="btn-power" onclick="logout()" title="Déconnexion">⏻</button>
        </div>
    </nav>

    <main class="main-content">
        <header class="header-top">
            <div class="user-info">
                <span id="userName">Chargement...</span>
                <span id="status" class="status-indicator">● À JOUR</span>
            </div>
        </header>

        <h1 class="section-title">Vos Devoirs</h1>
        <div class="hw-grid" id="hwList"></div>
    </main>

    <script>
        // Vérification de sécurité
        if (localStorage.getItem('ent_plus_logged') !== 'true') {
            window.location.replace("login.html");
        }

        async function init() {
            // On récupère la session sauvée lors du login
            const sessionRaw = localStorage.getItem('scolengo_session');
            if (!sessionRaw) return logout();
            
            const session = JSON.parse(sessionRaw);

            try {
                // 1. Récupération des devoirs via l'API Vercel
                // On utilise la route ?action=devoirs que nous avons créée dans api/index.js
                const hRes = await fetch('/api/index?action=devoirs', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ session: session }) // On envoie la session au proxy
                });

                const data = await hRes.json();
                
                // Mise à jour du nom (si présent dans la session ou les données)
                if (data.user) {
                    document.getElementById('userName').innerText = data.user.firstName + " " + data.user.lastName;
                }

                const list = document.getElementById('hwList');
                list.innerHTML = "";

                // Adaptation aux données de scolengo-api v3
                const items = data.items || data || [];

                if (Array.isArray(items) && items.length > 0) {
                    items.forEach(d => {
                        const rawDate = d.dueDateTime || d.dueDate;
                        let dateDisplay = "À venir";

                        if (rawDate) {
                            const dateObj = new Date(rawDate);
                            if (!isNaN(dateObj.getTime())) {
                                dateDisplay = dateObj.toLocaleDateString('fr-FR', {
                                    day: 'numeric', 
                                    month: 'short'
                                });
                            }
                        }

                        const subjectName = (typeof d.subject === 'object') ? d.subject.label : d.subject;

                        list.innerHTML += `
                            <div class="hw-card">
                                <div class="subject-tag">${subjectName || "Matière"}</div>
                                <div style="font-weight: 700; font-size: 17px; margin-bottom: 5px;">${d.title || "Exercices"}</div>
                                <div style="color: var(--apple-gray); font-size: 13px;">Pour le ${dateDisplay}</div>
                            </div>
                        `;
                    });
                } else {
                    list.innerHTML = "<p style='color: gray; padding: 20px;'>Aucun devoir trouvé.</p>";
                }
            } catch (e) {
                console.error(e);
                document.getElementById('status').innerText = "❌ ERREUR";
                document.getElementById('status').style.background = "var(--danger)";
            }
        }

        function logout() {
            localStorage.clear(); // On vide tout
            window.location.replace("login.html");
        }

        init();
    </script>
</body>
</html>
