<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Mon Super ENT+</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Bienvenue sur Mon Super ENT+</h1>
    <p id="status">Vérification du serveur...</p>

    <script>
        // On teste si notre proxy répond bien
        fetch('/api/hello')
            .then(res => res.json())
            .then(data => {
                document.getElementById('status').innerText = data.status;
            })
            .catch(err => {
                document.getElementById('status').innerText = "Erreur de connexion au proxy";
            });
    </script>
</body>
</html>
