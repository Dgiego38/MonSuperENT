<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ENT+</title>
    
    <script>
        // --- SCRIPT D'AIGUILLAGE ÉCLAIR ---
        
        // On vérifie si le marqueur de connexion est présent
        const isLogged = localStorage.getItem('ent_plus_logged') === 'true';

        if (isLogged) {
            // Utilisateur connecté -> On propulse vers l'accueil
            window.location.replace("accueil.html");
        } else {
            // Pas de session -> Direction la page de connexion
            window.location.replace("login.html");
        }
    </script>
    <style>
        /* On met un fond sombre pour que ce soit plus joli pendant la demi-seconde de chargement */
        body { background: #121212; }
    </style>
</head>
<body>
</body>
</html>
