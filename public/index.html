<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ENT+</title>
    
    <script>
        // --- SCRIPT D'AIGUILLAGE ÉCLAIR ---
        
        // On vérifie instantanément si la clé de session est présente
        const isLogged = localStorage.getItem('ent_plus_logged') === 'true';

        if (isLogged) {
            // Utilisateur connecté -> On propulse vers l'accueil
            // .replace() est crucial pour qu'on ne puisse pas faire "Retour"
            window.location.replace("accueil.html");
        } else {
            // Pas de session -> Hop, à la page de connexion
            window.location.replace("login.html");
        }
    </script>
</head>
<body style="background: white;">
    </body>
</html>
